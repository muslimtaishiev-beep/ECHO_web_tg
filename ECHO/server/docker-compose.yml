version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: echo_db_local
    restart: always
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo_pass
      POSTGRES_DB: echo_db
    ports:
      - '5432:5432'
    volumes:
      - echo_postgres_data:/var/lib/postgresql/data

volumes:
  echo_postgres_data:
